---
- name: Bootstrapping Alibaba ECS Ubuntu Server for MemBrain deployment
  hosts: all
  become: yes
  vars:
    node_version: "22.x"

  tasks:
    # 1. System packages update
    - name: Update apt package cache
      apt:
        update_cache: yes

    - name: Install dependencies
      apt:
        name:
          - curl
          - git
          - ca-certificates
          - gnupg
          - ufw
        state: present

    # 2. Node.js Installation
    - name: Add NodeSource apt key
      apt_key:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        state: present

    - name: Add NodeSource repository
      apt_repository:
        repo: "deb https://deb.nodesource.com/node_22.x nodistro main"
        state: present

    - name: Install Node.js
      apt:
        name: nodejs
        state: present

    - name: Install PNPM and PM2 globally
      npm:
        name: "{{ item }}"
        global: yes
      loop:
        - pnpm
        - pm2

    # 3. Docker Installation
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    # 4. Nginx Reverse Proxy Setup
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Create Nginx reverse proxy configuration block
      copy:
        dest: /etc/nginx/sites-available/membrain
        content: |
          server {
              listen 80;
              server_name membrain.example.com;

              location / {
                  proxy_pass http://localhost:3001;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host $host;
                  proxy_cache_bypass $http_upgrade;
              }
          }

    - name: Enable site configuration
      file:
        src: /etc/nginx/sites-available/membrain
        dest: /etc/nginx/sites-enabled/membrain
        state: link

    - name: Remove default Nginx site configuration
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Restart Nginx service
      service:
        name: nginx
        state: restarted
        enabled: yes

    # 5. Security - UFW Firewall
    - name: Configure firewall rules
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "80"
        - "443"

    - name: Enable firewall
      ufw:
        state: enabled
